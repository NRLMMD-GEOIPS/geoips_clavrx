ch08_enable = true  # 0.41um ocean-color
ch09_enable = true  # 0.44um ocean-color
ch10_enable = true  # 0.49um ocean-color
ch11_enable = true  # 0.53um ocean-color
ch12_enable = true  # 0.55um ocean-color
