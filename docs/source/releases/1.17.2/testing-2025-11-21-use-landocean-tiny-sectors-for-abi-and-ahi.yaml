bug fix:
  - title: "Use landocean tiny sectors for ABI and AHI CLAVR-x test scripts"
    description: |
      Use the standard geoips tiny test sectors

      * test_goeseast_eqc_3km_landocean
      * test_himawari_eqc_3km_landocean

      for the CLAVR-x GOES-16 and himawari-9 test scripts. This update did not require new tiny
      sectors, because for these tests we do not care about day or night contents
      of the datasets, but just want a tiny sector with coverage for GOES-16 and
      himawari-9.

      NOTE the mst script is not actually called, and the test data appears to not exist
      (points to 'reader_tests' GEOIPS_TESTDATA_DIR directory).  Removed test script,
      please re-add using supported test dataset, and add to integration test if needed.
