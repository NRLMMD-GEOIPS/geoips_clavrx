- title: 'Consolidated all clavrx external preprocessing scripts in geoips_clavrx/clavrx, separate static and dynamic ancildata retrieval'
  description: |
    * All scripts required to build, install, setup, and run the external clavrx processing
      should be under the geoips_clavrx/clavrx directory, since these are not
      geoips plugin package specific utilities, but only for the external clavrx package.
    * We could further rearrange into subdirectories within the clavrx directory, but
      these utilities should all stay within the clavrx directory.
    * Completely separate static and dynamic ancillary data scripts.
